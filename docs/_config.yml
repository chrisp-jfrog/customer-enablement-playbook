title: Customer Enablement Playbook
description: A living portfolio of enablement systems, playbooks, and customer success architecture.
baseurl: "/customer-enablement-playbook"
url: "https://your-org.github.io"

# GitHub Pages settings
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Navigation
nav:
  - title: About
    url: /
  - title: Flagship Project
    url: /flagship-project/
  - title: Playbooks
    url: /playbooks/

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude from build
exclude:
  - README.md
  - LICENSE
  - CHANGELOG.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - src/
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
